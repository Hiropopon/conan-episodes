<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名探偵コナン アニメエピソード一覧</title>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS変数 ===== */
    :root {
      --red:   #c0001a;
      --dark:  #0d0d0d;
      --gold:  #d4a017;
      --glass: rgba(10, 10, 20, 0.72);
      --gb:    rgba(255,255,255,0.08);
      --text:  #f0f0f0;
      --muted: #aaa;
    }

    /* ===== リセット ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== 背景 ===== */
    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: var(--dark);
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('back.JPG') center/cover no-repeat;
      opacity: 0.18;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== ヘッダー（画像全表示） ===== */
    header {
      position: relative;
      z-index: 1;
      width: 100%;
      border-bottom: 3px solid var(--red);
    }
    header img.header-img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0.75);
    }
    .header-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 30%, transparent);
    }
    .header-overlay h1 {
      font-family: 'DotGothic16', 'Noto Sans JP', sans-serif;
      font-size: clamp(1.4rem, 5vw, 2.6rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #fff;
      text-shadow:
        0 0 12px rgba(192,0,26,0.8),
        0 2px 16px rgba(0,0,0,0.9),
        3px 3px 0px rgba(192,0,26,0.4);
    }
    .header-overlay .subtitle {
      font-size: 0.95rem;
      color: var(--gold);
      letter-spacing: 0.4em;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-overlay .subtitle::after {
      content: '——';
      color: var(--red);
      letter-spacing: -2px;
      opacity: 0.9;
    }
    .header-overlay::after {
      content: '';
      display: block;
      width: 48px;
      height: 3px;
      background: var(--red);
      margin-top: 10px;
      border-radius: 2px;
    }

    /* ===== コンテンツ ===== */
    .content { position: relative; z-index: 1; }

    /* ===== 検索・フィルターエリア ===== */
    .controls {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gb);
      padding: 14px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      position: relative;
      z-index: 50;
    }
    .controls input[type="text"] {
      padding: 8px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      font-size: 0.88rem;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    .controls input[type="text"]::placeholder { color: var(--muted); }
    .controls input[type="text"]:focus { border-color: var(--red); }

    /* ===== カスタムドロップダウン（複数選択） ===== */
    .dropdown { position: relative; }
    .dropdown-btn {
      padding: 8px 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      font-size: 0.88rem;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 150px;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .dropdown-btn:hover,
    .dropdown.open .dropdown-btn {
      border-color: var(--red);
      background: rgba(255,255,255,0.11);
    }
    .dropdown-btn .arrow {
      margin-left: auto;
      font-size: 0.7rem;
      opacity: 0.6;
      transition: transform 0.2s;
    }
    .dropdown.open .dropdown-btn .arrow { transform: rotate(180deg); }
    .dropdown-btn .badge-count {
      background: var(--red);
      color: #fff;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 100%;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 6px 0;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .dropdown.open .dropdown-menu { display: block; }
    .dropdown-menu label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      font-size: 0.86rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .dropdown-menu label:hover { background: rgba(192,0,26,0.2); }
    .dropdown-menu input[type="checkbox"] {
      accent-color: var(--red);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .dropdown-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 4px 0;
    }
    .dropdown-clear {
      display: block;
      width: calc(100% - 16px);
      margin: 4px 8px 2px;
      padding: 5px 0;
      background: rgba(192,0,26,0.15);
      border: 1px solid rgba(192,0,26,0.3);
      border-radius: 5px;
      color: #fca5a5;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      text-align: center;
      transition: background 0.15s;
    }
    .dropdown-clear:hover { background: rgba(192,0,26,0.3); }

    /* ===== タグチップ ===== */
    .tag-chip {
      display: inline-block;
      padding: 2px 8px;
      margin: 2px 3px 2px 0;
      border-radius: 12px;
      font-size: 0.75rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .tag-chip:hover {
      background: rgba(192,0,26,0.25);
      border-color: var(--red);
      color: #fff;
    }

    /* ===== タグ予測変換 ===== */
    #tagSuggest {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 220px;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 4px 0;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      list-style: none;
      max-height: 240px;
      overflow-y: auto;
    }
    #tagSuggest li {
      padding: 8px 14px;
      font-size: 0.86rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #tagSuggest li:hover,
    #tagSuggest li.active {
      background: rgba(192,0,26,0.25);
      color: #fff;
    }

    /* ===== リセットボタン ===== */
    .btn-reset {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.84rem;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .btn-reset:hover {
      border-color: var(--red);
      color: #fca5a5;
      background: rgba(192,0,26,0.12);
    }
    .btn-reset.active {
      border-color: var(--red);
      color: #fca5a5;
    }

    .count {
      margin-left: auto;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .count span { color: var(--gold); font-weight: 700; }

    /* ===== テーブルエリア ===== */
    .table-wrap {
      overflow-x: auto;
      overflow-y: auto;
      max-height: calc(100vh - 280px);
      padding: 0 20px 40px;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 4px;
      font-size: 0.88rem;
    }
    thead tr { background: transparent; }
    th {
      background: rgba(192,0,26,0.85);
      color: #fff;
      padding: 11px 14px;
      text-align: left;
      white-space: nowrap;
      font-weight: 700;
      letter-spacing: 0.03em;
      font-size: 0.82rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    th:first-child { border-radius: 6px 0 0 6px; }
    th:last-child  { border-radius: 0 6px 6px 0; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover  { background: rgba(192,0,26,1); }
    th.sortable::after { content: ' ▲▼'; font-size: 0.65rem; opacity: 0.4; }
    th.sort-asc::after  { content: ' ▲'; font-size: 0.7rem; opacity: 1; }
    th.sort-desc::after { content: ' ▼'; font-size: 0.7rem; opacity: 1; }

    tbody tr {
      background: var(--glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.15s, transform 0.1s;
    }
    tbody tr:hover {
      background: rgba(192,0,26,0.18);
      transform: translateX(2px);
    }
    td {
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text);
    }
    td:first-child { border-radius: 6px 0 0 6px; color: var(--muted); font-size: 0.8rem; }
    td:last-child  { border-radius: 0 6px 6px 0; }

    /* ===== バッジ ===== */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-manga { background: rgba(59,130,246,0.2);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
    .badge-anime { background: rgba(234,179,8,0.15);  color: #fde68a; border: 1px solid rgba(234,179,8,0.25); }

    /* ===== 星評価 ===== */
    .stars { color: var(--gold); letter-spacing: -2px; font-size: 0.95rem; }

    /* ===== 0件メッセージ ===== */
    .no-results { text-align: center; padding: 60px; color: var(--muted); font-size: 0.95rem; }

    /* ===== スマホ対応 ===== */
    @media (max-width: 600px) {
      .controls { padding: 12px 14px; gap: 8px; }
      .controls input[type="text"] { width: 100%; }
      .dropdown-btn { min-width: 0; flex: 1; }
      .count { margin-left: 0; width: 100%; text-align: right; }
      .table-wrap { padding: 8px 8px 40px; }
      th, td { padding: 8px 9px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <img class="header-img" src="header.JPG" alt="名探偵コナン">
  <div class="header-overlay">
    <p class="subtitle">CASE FILE</p>
    <h1>名探偵コナン エピソードガイド</h1>
  </div>
</header>

<div class="content">
  <!-- 検索・フィルター -->
  <div class="controls">
    <div style="position:relative;">
      <input type="text" id="search" placeholder="🔍 関連タグで検索..." autocomplete="off">
      <ul id="tagSuggest"></ul>
    </div>

    <!-- シーズン -->
    <div class="dropdown" id="ddSeason">
      <div class="dropdown-btn" onclick="toggleDD('ddSeason')">
        <span class="dd-label">シーズン</span>
        <span class="arrow">▼</span>
      </div>
      <div class="dropdown-menu" id="menuSeason">
        <button class="dropdown-clear" onclick="clearDD('ddSeason')">すべて解除</button>
        <hr class="dropdown-divider">
      </div>
    </div>

    <!-- 原作/オリジナル -->
    <div class="dropdown" id="ddType">
      <div class="dropdown-btn" onclick="toggleDD('ddType')">
        <span class="dd-label">原作 / オリジナル</span>
        <span class="arrow">▼</span>
      </div>
      <div class="dropdown-menu">
        <button class="dropdown-clear" onclick="clearDD('ddType')">すべて解除</button>
        <hr class="dropdown-divider">
        <label><input type="checkbox" value="原作"> 原作</label>
        <label><input type="checkbox" value="アニメオリジナル"> アニメオリジナル</label>
      </div>
    </div>

    <!-- ストーリー関連 -->
    <div class="dropdown" id="ddStory">
      <div class="dropdown-btn" onclick="toggleDD('ddStory')">
        <span class="dd-label">ストーリー関連</span>
        <span class="arrow">▼</span>
      </div>
      <div class="dropdown-menu">
        <button class="dropdown-clear" onclick="clearDD('ddStory')">すべて解除</button>
        <hr class="dropdown-divider">
        <label><input type="checkbox" value="1"> ★1</label>
        <label><input type="checkbox" value="2"> ★2</label>
        <label><input type="checkbox" value="3"> ★3</label>
        <label><input type="checkbox" value="4"> ★4</label>
        <label><input type="checkbox" value="5"> ★5</label>
      </div>
    </div>

    <!-- おすすめ度 -->
    <div class="dropdown" id="ddRec">
      <div class="dropdown-btn" onclick="toggleDD('ddRec')">
        <span class="dd-label">おすすめ度</span>
        <span class="arrow">▼</span>
      </div>
      <div class="dropdown-menu">
        <button class="dropdown-clear" onclick="clearDD('ddRec')">すべて解除</button>
        <hr class="dropdown-divider">
        <label><input type="checkbox" value="1"> ★1</label>
        <label><input type="checkbox" value="2"> ★2</label>
        <label><input type="checkbox" value="3"> ★3</label>
        <label><input type="checkbox" value="4"> ★4</label>
        <label><input type="checkbox" value="5"> ★5</label>
      </div>
    </div>

    <button class="btn-reset" id="btnReset" onclick="resetAll()">✕ リセット</button>
    <span class="count" id="count"></span>
  </div>

  <!-- テーブル -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" data-key="num">#</th>
          <th>シーズン</th>
          <th>タイトル</th>
          <th>原作 / オリジナル</th>
          <th class="sortable" data-key="story">ストーリー関連</th>
          <th class="sortable" data-key="rec">おすすめ度</th>
          <th>関連タグ</th>
          <th>注記</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="no-results" id="noResults" style="display:none">該当するエピソードがありません</div>
  </div>
</div>

<script>
let allEpisodes = [];
let sortKey = 'num';
let sortDir = 'asc';

// ドロップダウン開閉
function toggleDD(id) {
  const dd = document.getElementById(id);
  const isOpen = dd.classList.contains('open');
  document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  if (!isOpen) dd.classList.add('open');
}
// 外クリックで閉じる
document.addEventListener('click', e => {
  if (!e.target.closest('.dropdown')) {
    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

// チェックを全解除
function clearDD(id) {
  document.querySelectorAll(`#${id} input[type="checkbox"]`).forEach(cb => cb.checked = false);
  updateBadge(id);
  render();
}

// 選択数バッジ更新
function updateBadge(id) {
  const dd = document.getElementById(id);
  const checked = dd.querySelectorAll('input[type="checkbox"]:checked').length;
  let badge = dd.querySelector('.badge-count');
  if (checked > 0) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'badge-count';
      dd.querySelector('.dd-label').after(badge);
    }
    badge.textContent = checked;
  } else {
    if (badge) badge.remove();
  }
}

// チェックボックスにイベント登録（動的生成分も含めて後から登録）
function bindCheckboxes(ddId) {
  document.querySelectorAll(`#${ddId} input[type="checkbox"]`).forEach(cb => {
    cb.addEventListener('change', () => { updateBadge(ddId); render(); });
  });
}

// CSV読み込み
async function loadCSV() {
  const res = await fetch('conan_episodes.csv');
  const text = await res.text();
  const lines = text.trim().split('\n');
  allEpisodes = lines.slice(1).map(line => {
    const cols = parseCSVLine(line);
    return {
      num:    cols[0] || '',
      season: cols[1] || '',
      title:  cols[2] || '',
      type:   cols[3] || '',
      story:  cols[4] || '',
      rec:    cols[5] || '',
      tag:    (cols[6] || '').split(',').map(t => t.trim()).filter(Boolean),
      note:   cols[7] || '',
    };
  });

  // シーズン選択肢を動的生成
  const seasons = [...new Set(allEpisodes.map(e => e.season))]
    .filter(Boolean)
    .sort((a, b) => Number(a) - Number(b));
  const menu = document.getElementById('menuSeason');
  seasons.forEach(s => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" value="${s}"> シーズン ${s}`;
    menu.appendChild(label);
  });

  // 全ドロップダウンにイベント登録
  ['ddSeason','ddType','ddStory','ddRec'].forEach(bindCheckboxes);

  render();
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuote = !inQuote; }
    else if (c === ',' && !inQuote) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function stars(n) {
  const val = Number(n);
  if (!val) return '';
  return '<span class="stars">' + '★'.repeat(Math.min(val, 5)) + '</span>';
}

function getChecked(id) {
  return [...document.querySelectorAll(`#${id} input[type="checkbox"]:checked`)].map(cb => cb.value);
}

function render() {
  const search  = document.getElementById('search').value.trim().toLowerCase();
  const seasons = getChecked('ddSeason');
  const types   = getChecked('ddType');
  const stories = getChecked('ddStory');
  const recs    = getChecked('ddRec');

  const filtered = allEpisodes.filter(e => {
    if (search   && !e.tag.some(t => t.toLowerCase().includes(search)))      return false;
    if (seasons.length && !seasons.includes(e.season))                      return false;
    if (types.length   && !types.includes(e.type))                          return false;
    if (stories.length && !stories.includes(String(Number(e.story) || 0))) return false;
    if (recs.length    && !recs.includes(String(Number(e.rec) || 0)))      return false;
    return true;
  });

  filtered.sort((a, b) => {
    const va = Number(a[sortKey]) || 0;
    const vb = Number(b[sortKey]) || 0;
    return sortDir === 'asc' ? va - vb : vb - va;
  });

  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.key === sortKey) {
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  filtered.forEach(e => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${e.num}</td>
      <td>${e.season}</td>
      <td>${e.title}</td>
      <td><span class="badge ${e.type === '原作' ? 'badge-manga' : 'badge-anime'}">${e.type}</span></td>
      <td>${stars(e.story)}</td>
      <td>${stars(e.rec)}</td>
      <td>${e.tag.map(t => `<span class="tag-chip" onclick="filterByTag('${t}')">${t}</span>`).join('')}</td>
      <td>${e.note}</td>
    `;
    tbody.appendChild(tr);
  });

  const countEl = document.getElementById('count');
  countEl.innerHTML = `<span>${filtered.length}</span> / ${allEpisodes.length} 件`;
  document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';

  // フィルター・ソートが初期値でなければリセットボタンをハイライト
  const isFiltered = search || seasons.length || types.length || stories.length || recs.length;
  const isSorted   = sortKey !== 'num' || sortDir !== 'asc';
  document.getElementById('btnReset').classList.toggle('active', !!(isFiltered || isSorted));
}

function filterByTag(tag) {
  document.getElementById('search').value = tag;
  document.getElementById('tagSuggest').style.display = 'none';
  render();
}

// ========================================
// タグ予測変換
// ========================================
let allTags = [];
let suggestIndex = -1;

function buildTagList() {
  // 全エピソードのタグ配列をフラットにして重複なし・ソート
  allTags = [...new Set(allEpisodes.flatMap(e => e.tag))].filter(Boolean).sort();
}

function showSuggest(val) {
  const ul = document.getElementById('tagSuggest');
  const q  = val.trim().toLowerCase();
  if (!q) { ul.style.display = 'none'; return; }

  const matched = allTags.filter(t => t.toLowerCase().includes(q));
  if (matched.length === 0) { ul.style.display = 'none'; return; }

  ul.innerHTML = '';
  matched.forEach(tag => {
    const li = document.createElement('li');
    li.textContent = tag;
    li.addEventListener('mousedown', () => {
      document.getElementById('search').value = tag;
      ul.style.display = 'none';
      render();
    });
    ul.appendChild(li);
  });
  ul.style.display = 'block';
  suggestIndex = -1;
}

const searchEl = document.getElementById('search');
const suggestEl = document.getElementById('tagSuggest');

searchEl.addEventListener('input', () => {
  showSuggest(searchEl.value);
  render();
});

// キーボード操作（↑↓で選択、Enterで確定、Escで閉じる）
searchEl.addEventListener('keydown', e => {
  const items = suggestEl.querySelectorAll('li');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    suggestIndex = Math.min(suggestIndex + 1, items.length - 1);
    items.forEach((li, i) => li.classList.toggle('active', i === suggestIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    suggestIndex = Math.max(suggestIndex - 1, -1);
    items.forEach((li, i) => li.classList.toggle('active', i === suggestIndex));
  } else if (e.key === 'Enter' && suggestIndex >= 0) {
    e.preventDefault();
    searchEl.value = items[suggestIndex].textContent;
    suggestEl.style.display = 'none';
    render();
  } else if (e.key === 'Escape') {
    suggestEl.style.display = 'none';
  }
});

// 外クリックでサジェストを閉じる
document.addEventListener('click', e => {
  if (!e.target.closest('#search') && !e.target.closest('#tagSuggest')) {
    suggestEl.style.display = 'none';
  }
  if (!e.target.closest('.dropdown')) {
    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

// 全フィルター・ソートをリセット
function resetAll() {
  document.getElementById('search').value = '';
  suggestEl.style.display = 'none';
  ['ddSeason','ddType','ddStory','ddRec'].forEach(id => {
    document.querySelectorAll(`#${id} input[type="checkbox"]`).forEach(cb => cb.checked = false);
    updateBadge(id);
  });
  sortKey = 'num';
  sortDir = 'asc';
  render();
}

document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    if (sortKey === key) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortKey = key;
      sortDir = 'asc';
    }
    render();
  });
});

async function init() {
  await loadCSV();
  buildTagList();
}
init();
</script>
</body>
</html>
